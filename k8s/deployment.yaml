apiVersion: v1
kind: Namespace
metadata:
  name: terraform-healer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: terraform-healer-config
  namespace: terraform-healer
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  WEBHOOK_PORT: "8000"
  WEBHOOK_HOST: "0.0.0.0"
  AI_PROVIDER: "anthropic"
  AI_MODEL: "claude-3-5-sonnet-20241022"
  AUTO_MERGE_ENABLED: "true"
  AUTO_MERGE_DELAY_HOURS: "24"
  LOW_RISK_AUTO_MERGE: "true"
  MEDIUM_RISK_AUTO_MERGE: "false"
  MAX_FILES_CHANGED: "2"
  MAX_LINES_PER_FILE: "20"
  AI_CONFIDENCE_THRESHOLD: "85"
  # Update these with your orgs/repos
  MONITORED_ORGS: "your-org1,your-org2"
  MONITORED_REPOS: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: terraform-healer-secrets
  namespace: terraform-healer
type: Opaque
stringData:
  # GitHub Configuration (use one of these methods)
  GITHUB_TOKEN: "your-github-token-here"
  # OR for GitHub App:
  # GITHUB_APP_ID: "your-app-id"
  # GITHUB_APP_PRIVATE_KEY_PATH: "/secrets/github-app-key.pem"
  GITHUB_WEBHOOK_SECRET: "your-webhook-secret"
  
  # AI Provider (choose one)
  ANTHROPIC_API_KEY: "your-anthropic-key"
  # OR
  # OPENAI_API_KEY: "your-openai-key"
  
  # Slack
  SLACK_BOT_TOKEN: "xoxb-your-slack-token"
  SLACK_CHANNEL_ID: "C01234567"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terraform-healer
  namespace: terraform-healer
  labels:
    app: terraform-healer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: terraform-healer
  template:
    metadata:
      labels:
        app: terraform-healer
    spec:
      containers:
      - name: terraform-healer
        image: your-registry/terraform-auto-remediation:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: tf-remediation-config
        - secretRef:
            name: tf-remediation-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: terraform-healer
  namespace: terraform-healer
spec:
  selector:
    app: terraform-healer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terraform-healer-ingress
  namespace: terraform-healer
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - terraform-healer.your-domain.com
    secretName: terraform-healer-tls
  rules:
  - host: terraform-healer.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: terraform-healer
            port:
              number: 80
